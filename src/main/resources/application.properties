spring.application.name=user-management-service

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/umbarry_uma_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Server Configuration
server.port=8080

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.use-root-path=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.show-actuator=false
springdoc.api-docs.groups.enabled=false

# Email Configuration
spring.mail.host=localhost
spring.mail.port=1025

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/umbarry
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/realms/umbarry/protocol/openid-connect/certs

keycloak.auth-server-url=http://localhost:8081
keycloak.realm=umbarry
keycloak.admin.username=admin
keycloak.admin.password=admin